server { # 定义一个 Nginx server 块。
    listen 80; # Nginx 在 container 内监听 80 端口。
    server_name _; # 匹配任意 Host 名称。

    root /usr/share/nginx/html; # 静态前端文件所在目录。
    index index.html; # 默认首页文件。

    # 前端页面本身是静态文件。
    location / { # 匹配非 /api/ 的普通页面请求。
        try_files $uri $uri/ /index.html; # 优先找真实静态文件，找不到就返回 index.html。
    }

    # 把 /api/ 请求代理到后端 internal ALB。
    location /api/ { # 匹配所有以 /api/ 开头的请求。
        proxy_pass http://${BACKEND_ALB_DNS_NAME}; # 转发到 Terraform 注入的 backend internal ALB DNS。
        proxy_set_header Host $host; # 把原始 Host header 传给后端。
        proxy_set_header X-Real-IP $remote_addr; # 把客户端 IP 传给后端。
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for; # 追加代理链路中的客户端 IP。
        proxy_set_header X-Forwarded-Proto $scheme; # 告诉后端原始请求协议是 http 还是 https。
    }
} # 结束 server 块。
